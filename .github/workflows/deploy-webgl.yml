name: Deploy Unity WebGL

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    name: Build and deploy WebGL
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Cache Unity Library
        uses: actions/cache@v4
        with:
          path: Library
          key: Library-WebGL-${{ hashFiles('Assets/**', 'Packages/**', 'ProjectSettings/**') }}
          restore-keys: |
            Library-WebGL-

      - name: Build Unity WebGL
        uses: game-ci/unity-builder@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          targetPlatform: WebGL
          unityVersion: auto
          buildsPath: build

      - name: Prepare deploy folder
        run: |
          rm -rf deploy/WebGLBuild
          mkdir -p deploy/WebGLBuild

          echo "Checking build output..."
          find build -maxdepth 4 -type f | head -50

          if [ -d "build/WebGL/WebGL" ]; then
            cp -r build/WebGL/WebGL/* deploy/WebGLBuild/
          elif [ -d "build/WebGL" ]; then
            cp -r build/WebGL/* deploy/WebGLBuild/
          else
            echo "WebGL build folder not found"
            exit 1
          fi

          ls -la deploy/WebGLBuild

      - name: Upload files to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "deploy/*"
          target: "${{ secrets.SERVER_PATH }}"
          strip_components: 1
          rm: true

      - name: Restart Docker on server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd ${{ secrets.SERVER_PATH }}
            docker compose down
            docker compose build --no-cache
            docker compose up -d
            docker ps
